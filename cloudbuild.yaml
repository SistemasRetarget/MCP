steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/retarget-mcp/cloud-run-source-deploy/workspace-mcp-global/mcp-server:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/retarget-mcp/cloud-run-source-deploy/workspace-mcp-global/mcp-server:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'cmsretargetv1'
      - '--image=europe-west1-docker.pkg.dev/retarget-mcp/cloud-run-source-deploy/workspace-mcp-global/mcp-server:latest'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=2'
      - '--set-env-vars=NODE_ENV=production,WORKSPACE_MCP_HOME=/app,RETARGET_WORKSPACE=/app/contracts'

images:
  - 'europe-west1-docker.pkg.dev/retarget-mcp/cloud-run-source-deploy/workspace-mcp-global/mcp-server:latest'
