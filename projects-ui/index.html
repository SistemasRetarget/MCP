<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Proyectos · MCP Retarget</title>
<style>
  :root {
    --bg: #0a0c11; --panel: #111419; --panel-2: #161a22; --panel-3: #1c2230;
    --border: #232838; --border-strong: #2e3548;
    --text: #e6e8ee; --muted: #8a92a6; --muted-2: #6b7280;
    --ok: #4ade80; --warn: #fbbf24; --err: #f87171; --crit: #ef4444;
    --accent: #FF6B35; --link: #93c5fd;
    --mono: 'SF Mono', ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    line-height: 1.5; min-height: 100vh;
  }
  .topbar {
    padding: 16px 32px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; gap: 16px;
    background: linear-gradient(180deg, var(--panel) 0%, var(--bg) 100%);
    position: sticky; top: 0; z-index: 10; backdrop-filter: blur(12px);
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .logo { width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #ff8e5a);
    display: grid; place-items: center; font-weight: 800; font-size: 14px; color: white; }
  .brand h1 { font-size: 16px; margin: 0; font-weight: 600; letter-spacing: 0.3px; }
  .brand small { color: var(--muted); display: block; font-size: 11px; }
  .topbar nav { display: flex; gap: 4px; }
  .topbar nav a { color: var(--muted); text-decoration: none; padding: 8px 14px;
    font-size: 13px; border-radius: 6px; }
  .topbar nav a:hover { background: var(--panel-2); color: var(--text); }
  .topbar nav a.active { background: var(--panel-3); color: var(--text); }
  .topbar-right { display: flex; gap: 12px; align-items: center; }
  .pill { padding: 5px 12px; border-radius: 999px; font-size: 11px;
    font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .pill.healthy { background: rgba(74,222,128,0.12); color: var(--ok); border: 1px solid rgba(74,222,128,0.3); }
  .pill.degraded { background: rgba(251,191,36,0.12); color: var(--warn); border: 1px solid rgba(251,191,36,0.3); }
  .pill.down { background: rgba(239,68,68,0.12); color: var(--crit); border: 1px solid rgba(239,68,68,0.3); }

  main { max-width: 1400px; margin: 0 auto; padding: 32px; }
  .page-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; }
  .page-head h2 { font-size: 28px; margin: 0; font-weight: 600; letter-spacing: -0.5px; }
  .page-head p { color: var(--muted); margin: 4px 0 0; font-size: 14px; }
  .page-head .actions button {
    padding: 9px 16px; background: var(--accent); color: white; border: 0;
    border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .page-head .actions button:hover { background: #ff8047; }

  /* Stat cards */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
  .stat .k { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .stat .v { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .stat .v.ok { color: var(--ok); }
  .stat .v.warn { color: var(--warn); }

  /* Project cards grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; transition: all 0.18s; text-decoration: none; color: inherit; display: block; }
  .card:hover { border-color: var(--border-strong); transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0,0,0,0.3); }
  .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 12px; }
  .card-head h3 { margin: 0; font-size: 17px; font-weight: 600; }
  .card-head .desc { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .card-tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; padding: 3px 8px; border-radius: 4px; background: var(--panel-3); color: var(--muted); white-space: nowrap; }
  .card-tag.active { background: rgba(74,222,128,0.15); color: var(--ok); }

  /* Progress bar */
  .progress { margin: 14px 0 4px; }
  .progress .row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .progress .row strong { color: var(--text); font-weight: 600; }
  .bar { height: 6px; background: var(--panel-3); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #ff8e5a); transition: width 0.4s; }
  .bar-fill.complete { background: linear-gradient(90deg, var(--ok), #67e892); }

  /* Card stats row */
  .card-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .card-stats .item { text-align: center; }
  .card-stats .n { font-size: 18px; font-weight: 700; }
  .card-stats .l { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-top: 2px; }
  .card-stats .n.err { color: var(--err); }
  .card-stats .n.ok { color: var(--ok); }

  /* Repo + deploy footer */
  .card-foot { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .card-foot .item { display: inline-flex; align-items: center; gap: 6px; padding: 3px 8px; background: var(--panel-2); border-radius: 4px; }
  .card-foot .item .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); }
  .card-foot .item .dot.err { background: var(--err); }
  .card-foot .item .dot.warn { background: var(--warn); }
  .card-tag.archived { background: rgba(125,133,149,0.15); color: var(--muted); }
  .card-tag.paused { background: rgba(245,158,11,0.15); color: var(--warn); }
  /* Status dropdown */
  .status-wrap { position: relative; display: inline-block; }
  .status-btn { background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
  .status-btn:hover { border-color: var(--accent); color: var(--text); }
  .status-btn.active { background: rgba(74,222,128,0.15); color: var(--ok); border-color: rgba(74,222,128,0.3); }
  .status-btn.archived { background: rgba(125,133,149,0.15); color: var(--muted); }
  .status-btn.paused { background: rgba(245,158,11,0.15); color: var(--warn); border-color: rgba(245,158,11,0.3); }
  .status-btn .caret { font-size: 8px; opacity: 0.6; }
  .status-menu { position: absolute; top: calc(100% + 4px); right: 0; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 4px; min-width: 160px; display: none; z-index: 10; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
  .status-menu.open { display: block; }
  .status-menu-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; font-size: 12px; color: var(--text); border-radius: 4px; cursor: pointer; user-select: none; }
  .status-menu-item:hover { background: var(--panel-3); }
  .status-menu-item.danger { color: var(--err); }
  .status-menu-item .icon { font-size: 14px; width: 16px; text-align: center; }
  .status-menu-item.current { opacity: 0.5; cursor: default; }
  .status-menu-item.current:hover { background: transparent; }
  /* Estilo visual para proyectos archivados (cuando se muestran) */
  body:not(.hide-archived) .card[data-status="archived"] { opacity: 0.55; }
  body:not(.hide-archived) .card[data-status="archived"]:hover { opacity: 1; }

  .empty { text-align: center; padding: 80px 20px; color: var(--muted); }
  .empty h3 { color: var(--text); font-weight: 500; margin: 0 0 6px; }

  footer.bottom { text-align: center; padding: 32px; color: var(--muted-2); font-size: 12px; border-top: 1px solid var(--border); margin-top: 48px; }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div class="logo">R</div>
    <div>
      <h1>MCP · Sistemas Retarget</h1>
      <small>Centro de control de proyectos</small>
    </div>
  </div>
  <nav>
    <a href="/projects">Proyectos</a>
    <a href="/solicitudes">Solicitudes</a>
    <a href="/roadmap">Roadmap</a>
    <a href="/salud">Salud</a>
    <a href="/eventos">Eventos</a>
    <a href="/equipo">Equipo</a>
    <a href="/monitor">Monitor</a>
    <a href="/tests">Tests</a>
  </nav>
  <div class="topbar-right">
    <a href="/salud" class="pill" id="health-pill" style="text-decoration:none">checking…</a>
  </div>
</div>

<main>
  <div class="page-head">
    <div>
      <h2>Proyectos</h2>
      <p id="subtitle">Cargando…</p>
    </div>
    <div class="actions">
      <label style="display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;margin-right:12px;cursor:pointer">
        <input type="checkbox" id="show-archived" style="cursor:pointer"> Mostrar archivados
      </label>
      <button onclick="location.reload()">⟲ Refrescar</button>
    </div>
  </div>

  <section class="stats" id="stats"></section>

  <section class="grid" id="grid">
    <div class="empty"><h3>Cargando proyectos…</h3></div>
  </section>
</main>

<footer class="bottom">
  Vista desarrollada por <strong style="color:var(--text)">Luis</strong> con
  <span style="color:var(--accent);display:inline-block;animation:pulse 2s infinite">❤</span> ·
  Sistemas Retarget · MCP v0.4 ·
  Auto-refresh 60s · <span id="now"></span>
</footer>
<style>@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }</style>

<script>
const $ = (s) => document.querySelector(s);

async function loadHealth(){
  try {
    const r = await fetch("/health");
    const h = await r.json();
    const p = $("#health-pill");
    p.textContent = h.overall || "?";
    p.className = "pill " + (h.overall === "healthy" ? "healthy" : (h.mcp?.alive ? "degraded" : "down"));
  } catch { $("#health-pill").textContent = "MCP no responde"; $("#health-pill").className = "pill down"; }
}

function progressClass(p) { return p >= 100 ? "complete" : ""; }
function fmtTs(iso) { if (!iso) return "—"; const d = new Date(iso); const diff = (Date.now() - d.getTime()) / 1000; if (diff < 60) return "hace " + Math.floor(diff) + "s"; if (diff < 3600) return "hace " + Math.floor(diff/60) + "m"; if (diff < 86400) return "hace " + Math.floor(diff/3600) + "h"; return d.toLocaleDateString("es-CL"); }
function shortHash(h) { if (!h) return "—"; return String(h).slice(0, 7); }

async function loadProjects(){
  try {
    const r = await fetch("/api/projects/list", { cache: "no-store" });
    const data = await r.json();
    const grid = $("#grid");
    const allProjects = data.projects || [];
    const showArchived = document.getElementById("show-archived")?.checked;
    const projects = showArchived ? allProjects : allProjects.filter(p => p.status !== "archived");

    if (allProjects.length === 0) {
      grid.innerHTML = `<div class="empty"><h3>No hay proyectos registrados</h3><p>Crea un archivo <code>projects/&lt;id&gt;-config.json</code> en el MCP.</p></div>`;
      $("#subtitle").textContent = "0 proyectos";
      $("#stats").innerHTML = "";
      return;
    }

    // Stats agregadas
    const totalProgress = projects.reduce((s,p)=>s + (p.progress||0), 0) / projects.length;
    const totalErrors = projects.reduce((s,p)=>s + (p.counts?.errors||0), 0);
    const totalFeedback = projects.reduce((s,p)=>s + (p.counts?.feedback||0), 0);
    const active = projects.filter(p => p.status === "active").length;

    $("#stats").innerHTML = `
      <div class="stat"><div class="k">Proyectos activos</div><div class="v ok">${active}</div></div>
      <div class="stat"><div class="k">Progreso promedio</div><div class="v">${Math.round(totalProgress)}%</div></div>
      <div class="stat"><div class="k">Errores reportados</div><div class="v ${totalErrors>0?'warn':'ok'}">${totalErrors}</div></div>
      <div class="stat"><div class="k">Feedback recibido</div><div class="v">${totalFeedback}</div></div>
    `;

    const archivedCount = allProjects.filter(p => p.status === "archived").length;
    $("#subtitle").textContent = `${projects.length} proyecto(s) visibles · ${archivedCount} archivado(s)`;
    if (projects.length === 0) {
      grid.innerHTML = `<div class="empty"><h3>Todos archivados</h3><p>Marca "Mostrar archivados" para verlos.</p></div>`;
      return;
    }

    grid.innerHTML = projects.map(p => {
      const st = p.status || "active";
      return `
      <a class="card" data-status="${st}" href="/projects/${encodeURIComponent(p.id)}">
        <div class="card-head">
          <div>
            <h3>${p.name || p.id}</h3>
            <div class="desc">${p.description || "—"}</div>
          </div>
          <div class="status-wrap">
            <button class="status-btn ${st}" onclick="openStatusMenu(event,'${p.id}')" title="Cambiar estado del proyecto">
              ${st} <span class="caret">▼</span>
            </button>
            <div class="status-menu" id="menu-${p.id}">
              <div class="status-menu-item ${st==='active'?'current':''}" onclick="${st==='active'?'':"changeStatus(event,'"+p.id+"','active')"}"><span class="icon">●</span> ${st==='active'?'Activo (actual)':'Activar'}</div>
              <div class="status-menu-item ${st==='paused'?'current':''}" onclick="${st==='paused'?'':"changeStatus(event,'"+p.id+"','paused')"}"><span class="icon">⏸</span> ${st==='paused'?'En pausa (actual)':'Pausar'}</div>
              <div class="status-menu-item danger ${st==='archived'?'current':''}" onclick="${st==='archived'?'':"changeStatus(event,'"+p.id+"','archived')"}"><span class="icon">🗄</span> ${st==='archived'?'Archivado (actual)':'Archivar'}</div>
            </div>
          </div>
        </div>

        <div class="progress">
          <div class="row"><span>${p.current_step || "—"}</span><strong>${p.progress||0}%</strong></div>
          <div class="bar"><div class="bar-fill ${progressClass(p.progress)}" style="width:${p.progress||0}%"></div></div>
        </div>

        <div class="card-stats">
          <div class="item"><div class="n">${p.progress||0}<span style="font-size:11px;color:var(--muted)">%</span></div><div class="l">progreso</div></div>
          <div class="item"><div class="n ${p.counts?.errors>0?'err':''}">${p.counts?.errors||0}</div><div class="l">errores</div></div>
          <div class="item"><div class="n">${p.counts?.feedback||0}</div><div class="l">feedback</div></div>
          <div class="item"><div class="n">${p.counts?.reasoning||0}</div><div class="l">decisiones</div></div>
        </div>

        <div class="card-foot">
          ${p.deployment?.url ? `<span class="item"><span class="dot ${p.deployment.status==='success'||p.deployment.status==='deployed'?'':'warn'}"></span>${(p.deployment.last_revision||p.deployment.revision||"deployed")}</span>`:""}
          ${p.deployment?.last_deploy_at || p.deployment?.last_deploy ? `<span class="item">⏱ ${fmtTs(p.deployment.last_deploy_at||p.deployment.last_deploy)}</span>`:""}
          ${p.deployment?.last_commit ? `<span class="item">⌥ ${shortHash(p.deployment.last_commit)}</span>`:""}
        </div>
      </a>
    `;
    }).join("");
  } catch(err) {
    $("#grid").innerHTML = `<div class="empty"><h3>Error al cargar proyectos</h3><p>${err.message}</p></div>`;
  }
}

function tick(){ $("#now").textContent = new Date().toLocaleString("es-CL", { hour12:false }); }

function closeAllStatusMenus(){
  document.querySelectorAll(".status-menu.open").forEach(m => m.classList.remove("open"));
}

function openStatusMenu(ev, projectId){
  ev.preventDefault();
  ev.stopPropagation();
  const menu = document.getElementById(`menu-${projectId}`);
  const wasOpen = menu?.classList.contains("open");
  closeAllStatusMenus();
  if (!wasOpen) menu?.classList.add("open");
}

async function changeStatus(ev, projectId, newStatus){
  ev.preventDefault();
  ev.stopPropagation();
  closeAllStatusMenus();
  const verb = { active: "activar", paused: "pausar", archived: "archivar" }[newStatus] || "cambiar";
  if (!confirm(`¿Seguro que quieres ${verb} el proyecto "${projectId}"?`)) return;
  try {
    const r = await fetch(`/api/projects/${encodeURIComponent(projectId)}/status`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status: newStatus })
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    await loadProjects();
  } catch(err) {
    alert(`No se pudo cambiar el estado: ${err.message}`);
  }
}

// Cerrar dropdowns al hacer click fuera
document.addEventListener("click", (ev) => {
  if (!ev.target.closest(".status-wrap")) closeAllStatusMenus();
});

document.getElementById("show-archived")?.addEventListener("change", loadProjects);

loadHealth();
loadProjects();
tick();
setInterval(() => { loadHealth(); loadProjects(); tick(); }, 60_000);
setInterval(tick, 1000);
</script>
</body>
</html>
