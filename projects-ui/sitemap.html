<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title id="page-title">Sitemap · MCP Retarget</title>
<style>
  :root {
    --bg: #0a0c11; --panel: #111419; --panel-2: #161a22; --panel-3: #1c2230;
    --border: #232838; --border-strong: #2e3548;
    --text: #e6e8ee; --muted: #8a92a6; --muted-2: #6b7280;
    --ok: #4ade80; --warn: #fbbf24; --err: #f87171; --accent: #FF6B35; --link: #93c5fd; --info: #3b82f6;
    --mono: 'SF Mono', ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; line-height: 1.5; }
  a { color: var(--link); text-decoration: none; } a:hover { text-decoration: underline; }
  code { font-family: var(--mono); background: var(--panel-2); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  img { max-width: 100%; }

  .topbar { padding: 14px 32px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; gap: 16px;
    background: var(--panel); position: sticky; top: 0; z-index: 10; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .logo { width: 28px; height: 28px; border-radius: 6px; background: linear-gradient(135deg, var(--accent), #ff8e5a); display: grid; place-items: center; font-weight: 800; color: white; font-size: 13px; }
  .topbar nav { display: flex; gap: 4px; }
  .topbar nav a { color: var(--muted); padding: 7px 14px; border-radius: 6px; font-size: 13px; }
  .topbar nav a.active, .topbar nav a:hover { background: var(--panel-2); color: var(--text); }

  main { max-width: 1400px; margin: 0 auto; padding: 32px; }
  .breadcrumb { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
  .breadcrumb a { color: var(--muted); } .breadcrumb a:hover { color: var(--text); }

  .hero { display: flex; justify-content: space-between; align-items: center; gap: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .hero h1 { margin: 8px 0 4px; font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
  .hero .desc { color: var(--muted); font-size: 14px; max-width: 700px; }

  .btn { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
  .btn:hover { background: var(--panel-3); border-color: var(--border-strong); }
  .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn.primary:hover { background: #ff8047; }

  .sitemap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
  .section-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px; cursor: pointer; transition: all 0.2s; }
  .section-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .section-card .head { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; gap: 12px; }
  .section-card .name { font-size: 16px; font-weight: 600; }
  .section-card .desc { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .section-card .status { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  .section-card .status.completado { background: rgba(74,222,128,0.15); color: var(--ok); }
  .section-card .status.referencia { background: rgba(239,68,68,0.15); color: var(--err); }
  .section-card .status.qa { background: rgba(59,130,246,0.15); color: var(--info); }
  .section-card .progress-bar { height: 4px; background: var(--panel-3); border-radius: 2px; margin-top: 12px; overflow: hidden; }
  .section-card .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #ff8e5a); transition: width 0.3s; }
  .section-card .meta { display: flex; gap: 12px; margin-top: 12px; font-size: 11px; color: var(--muted); }
  .section-card .meta span { display: flex; align-items: center; gap: 4px; }
  .section-card .btn-qa { margin-top: 12px; width: 100%; justify-content: center; }

  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
  .loading { text-align: center; padding: 48px 20px; color: var(--muted); }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div class="logo">R</div>
    <div>
      <strong>MCP · Retarget</strong>
      <div style="font-size:11px;color:var(--muted)">Sitemap QA</div>
    </div>
  </div>
  <nav>
    <a href="/projects">Proyectos</a>
    <a href="/solicitudes">Solicitudes</a>
    <a href="/roadmap">Roadmap</a>
    <a href="/salud">Salud</a>
    <a href="/monitor">Monitor</a>
  </nav>
</div>

<main>
  <div class="breadcrumb">
    <a href="/projects">Proyectos</a> / <span id="project-name">...</span> / <strong>Sitemap</strong>
  </div>

  <div class="hero">
    <div>
      <h1>Sitemap QA</h1>
      <div class="desc" id="project-desc">Cargando información del proyecto...</div>
    </div>
    <a href="/projects" class="btn">← Volver a proyectos</a>
  </div>

  <div id="sitemap-content"><div class="loading">Cargando sitemap...</div></div>
</main>

<script>
const PROJECT_ID = new URLSearchParams(window.location.search).get("id");
if (!PROJECT_ID) {
  document.getElementById("sitemap-content").innerHTML = '<div class="empty">No se especificó proyecto. <a href="/projects">Volver a proyectos</a></div>';
}

function $(s){ return document.querySelector(s); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// Estructura de secciones del sitio
const SITE_SECTIONS = [
  { id: 'header', nombre: 'Header', tipo: 'global' },
  { id: 'footer', nombre: 'Footer', tipo: 'global' },
  { id: 'hero', nombre: 'Hero', tipo: 'landing' },
  { id: 'promociones', nombre: 'Promociones', tipo: 'landing' },
  { id: 'destino', nombre: 'Destino', tipo: 'landing' },
  { id: 'hotel', nombre: 'Hotel', tipo: 'landing' },
  { id: 'que-hacer', nombre: 'Qué Hacer', tipo: 'landing' },
  { id: 'programas', nombre: 'Programas', tipo: 'landing' },
  { id: 'eventos', nombre: 'Eventos', tipo: 'landing' },
  { id: 'sostenibilidad', nombre: 'Sostenibilidad', tipo: 'landing' },
  { id: 'ven-por-el-dia', nombre: 'Ven por el Día', tipo: 'landing' },
];

async function loadSitemap() {
  if (!PROJECT_ID) return;
  try {
    const r = await fetch(`/api/projects/${encodeURIComponent(PROJECT_ID)}`);
    const p = await r.json();
    
    if (!p) {
      document.getElementById("sitemap-content").innerHTML = '<div class="empty">Proyecto no encontrado. <a href="/projects">Volver a proyectos</a></div>';
      return;
    }

    document.getElementById("project-name").textContent = p.name || PROJECT_ID;
    document.getElementById("project-desc").textContent = p.description || "Sitemap de QA para revisión de secciones";

    // Mapear estado de landings y header/footer
    const landings = p.landings || [];
    const sections = SITE_SECTIONS.map(s => {
      let estado = 'referencia';
      let progreso = 0;
      let observaciones = [];
      let descripcion = '';

      if (s.tipo === 'global') {
        // Header/Footer están en cada landing
        const headerStatus = landings.map(l => l.header?.status).filter(Boolean);
        const footerStatus = landings.map(l => l.footer?.status).filter(Boolean);
        
        if (s.id === 'header' && headerStatus.length > 0) {
          const completados = headerStatus.filter(st => st === 'completado').length;
          progreso = Math.round((completados / headerStatus.length) * 100);
          estado = progreso === 100 ? 'completado' : (progreso > 0 ? 'qa' : 'referencia');
        }
        if (s.id === 'footer' && footerStatus.length > 0) {
          const completados = footerStatus.filter(st => st === 'completado').length;
          progreso = Math.round((completados / footerStatus.length) * 100);
          estado = progreso === 100 ? 'completado' : (progreso > 0 ? 'qa' : 'referencia');
        }
      } else {
        // Secciones de landing
        const landing = landings.find(l => l.id === s.id);
        if (landing) {
          estado = landing.status === 'completado' ? 'completado' : (landing.status === 'qa' ? 'qa' : 'referencia');
          progreso = landing.progress || 0;
          descripcion = landing.description || '';
          observaciones = landing.observations || [];
        }
      }

      return { ...s, estado, progreso, descripcion, observaciones };
    });

    const container = document.getElementById("sitemap-content");
    container.innerHTML = `<div class="sitemap-grid">${sections.map(s => `
      <div class="section-card" onclick="openDetail('${s.id}')">
        <div class="head">
          <div>
            <div class="name">${escapeHtml(s.nombre)}</div>
            <div class="desc">${s.tipo === 'global' ? 'Elemento global' : 'Sección de landing'}</div>
          </div>
          <span class="status ${s.estado}">${s.estado}</span>
        </div>
        ${s.descripcion ? `<div class="desc" style="margin-top:8px">${escapeHtml(s.descripcion)}</div>` : ''}
        <div class="progress-bar">
          <div class="progress-fill" style="width:${s.progreso}%"></div>
        </div>
        <div class="meta">
          <span>📊 ${s.progreso}%</span>
          <span>💬 ${s.observaciones?.length || 0} obs</span>
        </div>
        <button class="btn btn-qa">Ver detalles de QA →</button>
      </div>
    `).join('')}</div>`;
  } catch(err) {
    document.getElementById("sitemap-content").innerHTML = `<div class="empty">Error: ${err.message}</div>`;
  }
}

function openDetail(sectionId) {
  window.location.href = `/sitemap-detail?id=${PROJECT_ID}&section=${sectionId}`;
}

loadSitemap();
</script>
</body>
</html>
